<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Curtain rod -->
  <line x1="8" y1="10" x2="56" y2="10"/>
  <!-- Small finials at rod ends -->
  <circle cx="8" cy="10" r="2.5" fill="#FFFFFF" stroke="none"/>
  <circle cx="56" cy="10" r="2.5" fill="#FFFFFF" stroke="none"/>
  <!-- Left curtain panel - draped outward with folds -->
  <path d="M16 10 C14 20, 10 30, 8 45 C7 50, 8 54, 10 58"/>
  <path d="M24 10 C22 22, 18 34, 16 46 C15 51, 15 55, 16 58"/>
  <!-- Right curtain panel - draped outward with folds -->
  <path d="M40 10 C42 22, 46 34, 48 46 C49 51, 49 55, 48 58"/>
  <path d="M48 10 C50 20, 54 30, 56 45 C57 50, 56 54, 54 58"/>
  <!-- Subtle swag between panels -->
  <path d="M24 10 C28 18, 36 18, 40 10" stroke-width="1.5"/>
</svg>
