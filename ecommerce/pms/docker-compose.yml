services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pms
      POSTGRES_USER: pms
      POSTGRES_PASSWORD: pms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "pms"]
      interval: 5s
      timeout: 5s
      retries: 5

  pms:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://pms:pms@postgres:5432/pms
      SHOPIFY_STORE_DOMAIN: 1z7hb1-2d.myshopify.com
      NODE_ENV: production
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../products:/app/products:ro

volumes:
  postgres_data:
